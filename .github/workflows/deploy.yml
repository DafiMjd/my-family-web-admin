name: Build and Deploy Web Admin

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fam/web-admin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.HOSTINGER_GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Verify required deploy secrets
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_APP_PATH: ${{ secrets.HOSTINGER_APP_PATH }}
          HOSTINGER_GHCR_USER: ${{ secrets.HOSTINGER_GHCR_USER }}
          HOSTINGER_GHCR_TOKEN: ${{ secrets.HOSTINGER_GHCR_TOKEN }}
        run: |
          set -e
          test -n "$HOSTINGER_HOST"
          test -n "$HOSTINGER_USER"
          test -n "$HOSTINGER_SSH_KEY"
          test -n "$HOSTINGER_APP_PATH"
          test -n "$HOSTINGER_GHCR_USER"
          test -n "$HOSTINGER_GHCR_TOKEN"

      - name: Deploy Web Admin on Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.HOSTINGER_APP_PATH }}"
            echo "${{ secrets.HOSTINGER_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.HOSTINGER_GHCR_USER }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull web-admin
            docker compose -f docker-compose.prod.yml up -d web-admin
